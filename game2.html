<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>RE:TONE - 상황 실험 퀴즈</title>
    <!-- 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- 이 페이지 전용 CSS 연결 -->
    <link rel="stylesheet" href="game2.css" />
    <link rel="stylesheet" href="common.css" />
  </head>

  <body>
    <body style="background-image: url(&quot;images/bgh.png&quot;)"></body>
    <div class="navbar">
      <a href="opening.html" class="logo">RE:TONE</a>

      <ul class="menu">
        <li><a href="index.html">언어 포장</a></li>
        <li><a href="storage.html">언어 창고</a></li>
        <li><a href="test.html">포장 유형 테스트</a></li>
        <li class="active"><a href="lab.html">가상 대화 실험</a></li>
      </ul>
    </div>

    <!-- 🔥 전체 게임 화면 -->
    <div class="game-container">
      <!-- 1️⃣ 왼쪽: 캐릭터 일러스트 -->
      <div class="character-area">
        <!-- 🚨 src 속성에 직접 만드신 캐릭터 이미지 파일 경로를 넣어주세요 -->
        <img
          src="images/hurry1.png"
          alt="당황한 캐릭터"
          class="character-img"
        />
      </div>

      <!-- 2️⃣ 오른쪽: 질문 및 선택지 -->
      <div class="quiz-area">
        <!-- 질문 박스 -->
        <div class="question-box">
          <h2>팀원이 자료를 보내주기로 했는데 계속 늦고 있는 상황</h2>
          <p>
            팀원이 약속 기한이 지나도 자료를 안 보내주고 있다. 하지만 재촉은
            해야 한다.<br />당신의 첫 마디는?
          </p>
        </div>
        <div class="options">
          <!-- ⭕ 정답: 에어캡 -->
          <button class="option-btn" onclick="location.href = 'correct2.html'">
            혹시 작업 어디까지 됐는지 알 수 있을까요? 일정 때문에 조금 확인하고
            싶어요!
          </button>
          <!-- 선택지 목록 -->

          <!-- ❌ 오답: 압축팩 -->
          <button class="option-btn" onclick="location.href = 'wrong2.html'">
            아직도 안 보내신건가요? 다들 기다리고 있는데.
          </button>

          <!-- ❌ 오답: 크라프트지 -->
          <button class="option-btn" onclick="location.href = 'wrong2.html'">
            계속 이러실 거면 그냥 팀플 안 하시는 게 나을 것 같은데요.
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
