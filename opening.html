<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RE:TONE Opening</title>
    <link rel="stylesheet" href="opening.css" />
  </head>

  <body>
    <!-- 상단 패키지 -->
    <div class="packages">
      <div class="pkg"><img src="images/bubble.png" alt="에어캡" /></div>
      <div class="pkg"><img src="images/kraft.png" alt="박스" /></div>
      <div class="pkg"><img src="images/bojagi.png" alt="보자기" /></div>
      <div class="pkg"><img src="images/gold.png" alt="골드박스" /></div>
      <div class="pkg"><img src="images/vacuum.png" alt="은박파우치" /></div>
      <div class="pkg"><img src="images/holo.png" alt="홀로그램" /></div>
    </div>

    <!-- 구분선 -->
    <div class="divider"></div>

    <!-- 텍스트 -->
    <div class="text-area">
      <!-- ✨ RE 버튼과 말풍선(툴팁) 영역 -->
      <div class="re-wrapper">
        <div id="re-tooltip" class="re-tooltip">Click!</div>
        <button id="re-btn" class="re-btn clickable">RE</button>
      </div>

      <div id="colon-area" class="colon">
        <div class="colon-dot"></div>
        <div class="colon-dot"></div>
      </div>

      <div id="typed-text" class="typed-text"></div>
    </div>

    <!-- 푸터 -->
    <div class="footer">
      <span class="footer-item">Wrap your words</span>
      <span class="footer-item">Soften the message</span>
      <span class="footer-item">Filter what you say</span>
      <span class="footer-item">Say it differently</span>
    </div>

    <script src="opening.js"></script>
  </body>
</html>
