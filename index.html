<!doctype html>

<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <title>RE:TONE</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <link rel="stylesheet" href="common.css" />
  </head>

  <body>
    <audio id="paperSound" preload="auto">
      <source src="sounds/paper.mp3" type="audio/mpeg" />
    </audio>
    <div class="navbar">
      <a href="opening.html" class="logo">RE:TONE</a>

      <ul class="menu">
        <li class="active"><a href="index.html">언어 포장</a></li>

        <li><a href="storage.html">언어 창고</a></li>

        <li><a href="test.html">포장 유형 테스트</a></li>

        <li><a href="lab.html">가상 대화 실험</a></li>
      </ul>
    </div>
    <div class="roll bojagi" id="bojagiRoll">
      <img src="images/bojagi1.png" />
    </div>

    <div class="roll hologram" id="holoRoll">
      <img src="images/holo1.png" />
    </div>

    <div class="roll vacuum" id="vacuumRoll">
      <img src="images/vacuum1.png" />
    </div>

    <div class="roll kraft" id="kraftRoll">
      <img src="images/kraft1.png" />
    </div>

    <div class="roll gold" id="goldRoll">
      <img src="images/gold1.png" />
    </div>

    <div class="roll aircap" id="aircapRoll">
      <img src="images/aircap1.png" />
    </div>
    <div class="container">
      <div class="card-wrap">
        <div id="sparkle"></div>

        <div class="card-inner">
          <div class="card-front">
            <div class="card-bg" id="card-bg">
              <div id="smoke-overlay"></div>

              <textarea
                id="input-text"
                placeholder="포장할 직설적인 문장을 입력하세요"
                maxlength="47"
              ></textarea>

              <div id="result-text"></div>

              <button id="convert-btn" onclick="convert()">포장하기</button>
            </div>
          </div>

          <div class="card-back"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
